name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node
          manifest-file: .release-please-manifest.json
          config-file: release-please-config.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile

      - name: Copy README into src/ for npm
        run: cp README.md src/README.md

      - name: Sync version to src/package.json
        run: node -e "
          const root = require('./package.json');
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('src/package.json','utf8'));
          pkg.version = root.version;
          fs.writeFileSync('src/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - run: bun run build:lib

      - run: npm publish --access public
        working-directory: src
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
